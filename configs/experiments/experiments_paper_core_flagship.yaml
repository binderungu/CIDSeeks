base_config: config.yaml
output_dir: results/paper_core
bootstrap_samples: 10000
confidence: 0.95
alpha_thresholds:
  fqr_max: 0.05
  asr_max: 0.2
runs_per_variant: 10
seed_start: 10000
stats_gate:
  enforce: true
  min_seeds: 10
  required_metrics: [AUROC_final, TTD_median, FPR_h]
  max_ci_width:
    AUROC_final: 0.20
    FPR_h: 0.20

scenarios:
  - scenario_id: collusion_flagship
    attack_type: Collusion
    notes: "High-confidence profile for final paper figures."
    parameters:
      n_nodes: [50, 100, 200, 500]
      iterations: [200, 500]
      fraction_colluders: [0.1, 0.3, 0.5]
      challenge_rate: [0.10]
      forgetting_factor: [0.9]
      trust_threshold: [0.7]
      trust_model: [three_level_challenge]
      privacy_strategy: [dmpo_x]
      auth_mode: [required]

  - scenario_id: pmfa_flagship
    attack_type: PMFA
    notes: "High-confidence profile for PMFA fingerprinting resistance with DMPO legacy vs DMPO-X."
    parameters:
      n_nodes: [50, 100, 200, 500]
      iterations: [200, 500]
      fraction_colluders: [0.2]
      fraction_sybils: [0.05]
      challenge_rate: [0.05, 0.15]
      trust_model: [three_level_challenge]
      forgetting_factor: [0.9]
      trust_threshold: [0.7]
      privacy_strategy: [dmpo_legacy, dmpo_x]
      attribution_profile: [full]
      auth_mode: [required]

  - scenario_id: pmfa_attribution_flagship
    attack_type: PMFA
    notes: "High-confidence attribution ablation profile on canonical DMPO-X."
    parameters:
      n_nodes: [200]
      iterations: [240]
      fraction_colluders: [0.2]
      fraction_sybils: [0.05]
      challenge_rate: [0.10]
      trust_model: [three_level_challenge]
      forgetting_factor: [0.9]
      trust_threshold: [0.7]
      privacy_strategy: [dmpo_x]
      attribution_profile: [full, no_fibd, no_split_fail, no_coalcorr]
      auth_mode: [required]

  - scenario_id: sybil_flagship
    attack_type: Sybil
    notes: "High-confidence profile for Sybil robustness."
    parameters:
      n_nodes: [50, 100, 200, 500]
      iterations: [200, 500]
      fraction_colluders: [0.2]
      fraction_sybils: [0.05, 0.1, 0.2]
      challenge_rate: [0.05, 0.15]
      trust_model: [three_level_challenge]
      trust_threshold: [0.7]
      forgetting_factor: [0.9]
      privacy_strategy: [dmpo_x]
      auth_mode: [required]

  - scenario_id: betrayal_flagship
    attack_type: Betrayal
    notes: "High-confidence profile for betrayal timing analysis."
    parameters:
      n_nodes: [50, 100, 200, 500]
      iterations: [200, 500]
      fraction_colluders: [0.2]
      betrayal_iteration: [20, 40]
      challenge_rate: [0.10]
      trust_model: [three_level_challenge]
      forgetting_factor: [0.9]
      trust_threshold: [0.7]
      privacy_strategy: [dmpo_x]
      auth_mode: [required]

  - scenario_id: topology_flagship
    attack_type: PMFA
    notes: "Topology sweep for reviewer-facing robustness."
    parameters:
      n_nodes: [200, 1000]
      iterations: [240]
      network_type: [random, small_world, scale_free, hybrid]
      malicious_ratio: [0.1, 0.2]
      challenge_rate: [0.10]
      trust_model: [three_level_challenge]
      trust_threshold: [0.7]
      privacy_strategy: [dmpo_x]
      attribution_profile: [full]
      auth_mode: [required]

  - scenario_id: privacy_trust_sensitivity_flagship
    attack_type: PMFA
    notes: "Sensitivity sweep for privacy delay/variants and trust threshold."
    parameters:
      n_nodes: [200]
      iterations: [240]
      trust_threshold: [0.6, 0.7, 0.8]
      variants_per_alarm: [1, 3]
      privacy_strategy: [dmpo_legacy, dmpo_x]
      min_alarm_send_delay: [0.0]
      max_alarm_send_delay: [0.0, 1.0]
      challenge_rate: [0.10]
      trust_model: [three_level_challenge]
      attribution_profile: [full]
      auth_mode: [required]
